<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.E.X.U.S</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Courier+New&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="//cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="logo glitch-wrapper">
            <div class="glitch" data-text="N.E.X.U.S">N.E.X.U.S</div>
        </div>
        
        <button id="newChatBtn" class="new-chat-btn">+ NEW PROTOCOL</button>

        <div class="section-title">ACTIVE ORDERS</div>
        <div id="active-orders-list" style="margin-bottom: 20px;">
            <div style="font-size: 12px; color: #555; padding: 5px;">Scanning directives...</div>
        </div>

        <div class="section-title">MEMORY BANKS</div>
        <div id="session-list" style="overflow-y: auto; flex: 1; margin-bottom: 20px; scrollbar-width: none;">
            <div style="font-size: 12px; color: #555; padding: 5px;">Loading Memory...</div>
        </div>

        <div class="user-profile" style="margin-top: auto; margin-bottom: 10px;">
            <div class="avatar" style="display:flex; align-items:center; justify-content:center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-info">
                <div class="username">COMMANDER</div>
                <div class="status">● ONLINE</div>
            </div>
        </div>

        <div class="system-status-panel" style="background: rgba(0, 20, 10, 0.8); border: 1px solid #00ff88; border-radius: 6px; padding: 10px; text-align: center;">
            <div id="live-greeting" style="font-size: 10px; color: #00ff88; letter-spacing: 1px; font-weight: bold; margin-bottom: 2px;">SYSTEM READY</div>
            <div id="live-clock" style="font-size: 22px; color: #fff; font-weight: 800; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);">00:00:00</div>
            <div id="live-date" style="font-size: 9px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;">SYNCING...</div>
        </div>
    </div>

    <div class="main-content">
        <div id="canvas-container"></div>

        <div id="voice-overlay" class="voice-overlay hidden">
            <canvas id="voice-canvas"></canvas>
            <div class="voice-status">INITIALIZING...</div>
        </div>

        <div class="hud-container">
            <div class="hud-line"></div>
            <div class="hud-center">
                <h1 class="hud-title">N.E.X.U.S</h1>
                <div class="status-wrapper">
                    <div id="statusLight" class="status-light green"></div>
                    <div id="statusText" class="hud-subtitle">SYSTEM ONLINE</div>
                </div>
            </div>
            <div class="hud-line"></div>
        </div>

        <div id="feed"></div>

        <div class="input-wrapper">
            <div class="input-pill">
                <video id="webcam" autoplay playsinline style="display:none;"></video>
                <canvas id="vision-canvas" style="display:none;"></canvas>

                <input type="file" id="fileInput" style="display: none;">

                <button id="attachBtn" class="icon-btn" title="Upload File" style="margin-right: 10px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>

                <button id="visionBtn" class="icon-btn" title="Activate Vision" style="margin-right: 15px; color: #00ff88;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>

                <input type="text" id="userInput" placeholder="Awaiting command...">
                
                <div class="actions">
                    <button id="micBtn" class="icon-btn" title="Voice Command">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>

                    <button id="sendBtn" class="send-circle" title="Execute">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="bg.js"></script>
    <script src="voiceOrb.js"></script>
    <script src="app.js"></script>
</body>
</html>
